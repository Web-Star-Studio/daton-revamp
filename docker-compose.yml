services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: daton
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d daton"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ./.env
    working_dir: /workspace
    environment:
      CHOKIDAR_USEPOLLING: "true"
      PORT: "8787"
      DATABASE_URL: ${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/daton}
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
      CORS_ORIGIN: http://127.0.0.1:3000
    command:
      - bash
      - -lc
      - |
        pnpm db:migrate
        pnpm --filter @daton/backend dev
    ports:
      - "8787:8787"
    volumes:
      - ./apps:/workspace/apps
      - ./packages:/workspace/packages
      - ./tsconfig.base.json:/workspace/tsconfig.base.json
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml
      - ./.env:/workspace/.env

  web:
    build:
      context: .
      dockerfile: Dockerfile.dev
    depends_on:
      backend:
        condition: service_started
    env_file:
      - ./.env
    working_dir: /workspace
    environment:
      NEXT_PUBLIC_API_URL: http://127.0.0.1:3000
      INTERNAL_API_URL: http://backend:8787
      NEXT_PUBLIC_APP_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
      WATCHPACK_POLLING: "true"
    command:
      - bash
      - -lc
      - |
        pnpm --filter @daton/web exec next dev --hostname 0.0.0.0 --port 3000
    ports:
      - "3000:3000"
    volumes:
      - ./apps:/workspace/apps
      - ./packages:/workspace/packages
      - ./tsconfig.base.json:/workspace/tsconfig.base.json
      - ./pnpm-workspace.yaml:/workspace/pnpm-workspace.yaml
      - ./.env:/workspace/.env

volumes:
  postgres_data:
